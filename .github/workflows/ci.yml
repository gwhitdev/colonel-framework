name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Framework Tests
        run: bun run test:framework

      - name: Template Parity
        run: bun run test:parity

      - name: Scaffold Smoke Test
        run: bun run test:smoke